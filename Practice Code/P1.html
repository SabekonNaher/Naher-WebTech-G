<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>

    <style>
        body{
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
            color: BLACK;
            background-color: burlywood;
            padding: 10px;
           
        }

        p{
            font-size: 20px;
            color: brown;
            font-weight: bold;
        }

        p:hover{
               color: blue;
        }

        #main-heading {
            border: 3px dashed red;
        }

        .input-style {
            border-radius: 5px;
            padding: 5px;
            background-color: bisque;
        }

        form {
            width: 50%;
            margin: auto;
            border: 3px solid green;
            padding: 20px;
        }

        label {
            font-weight: bold;
        }

        a:link {
            color: blue;
        }

        a:visited {
            color: gray;
        }

        a:hover {
            font-size: 20px;
        }

        a:active {
            color: red;
        }

        input:focus {
            background-color: yellowgreen;
        }

        input[type="submit"] {
            background-color: green;
            color: white;
            padding: 10px;
        }

        input[type="reset"] {
            background-color: red;
            color: white;
            padding: 10px;
        }
    </style>
</head>

<body>

    <h1 id="main-heading">Student Registration Form</h1>

    <p>Complete the form below.</p>

    <a href="https://www.google.com" target="_blank">Google</a>

    <br><br>

    <form>

        <fieldset>
            <legend>Personal Information</legend>

            <label>Name:</label>
            <input class="input-style" type="text" id="studentName" name="studentName" placeholder="Enter your name">
            <br><br>

            <label>Email:</label>
            <input class="input-style" type="email" id="email" ,name="email" placeholder="Enter your email">
            <br><br>

            <label>Password:</label>
            <input class="input-style" type="password">
            <br><br>

            <label>Age:</label>
            <input class="input-style" type="number" min="1" max="100">
        </fieldset>

        <br>

        <label>Gender:</label><br>

        <input type="radio" id="gender" name="gender"> Male <br>
        <input type="radio" id="gender" name="gender"> Female <br>
        <input type="radio" id="gender" name="gender"> Other

        <br><br>

        <label>Skills:</label><br>

        <input type="checkbox"> HTML
        <input type="checkbox"> CSS
        <input type="checkbox"> JavaScript

        <br><br>

        <label>Department:</label>

        <select>
            <option>CSE</option>
            <option>EEE</option>
            <option>BBA</option>
        </select>

        <br><br>

        <label>Comments:</label><br>

        <textarea rows="5" cols="30"></textarea>

        <br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Clear">

    </form>

</body>
</html>
